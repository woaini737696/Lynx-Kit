# LynxKit 项目 nginx 配置（SSR 版）
# 隔离原则：与 lynx 项目（lynxdo 配置）完全独立
# 更新记录：
#   2026-07-04: / 改为反代 Next.js SSR（端口 3000），保留 /api/ /lynxkit/

# ============ HTTP（跳转 HTTPS）============
server {
    listen 80;
    server_name miaox.lynxdo.com;
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============ HTTPS（主服务）============
server {
    listen 443 ssl;
    server_name miaox.lynxdo.com;

    ssl_certificate /etc/letsencrypt/live/miaox.lynxdo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miaox.lynxdo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ============ API 反向代理（端口 8788）============
    location /api/ {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ============ Web SSR 反向代理（端口 3000）============
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ============ Next.js 静态资源（_next/static 长缓存）============
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ============ LynxKit 桌面端自动更新源（HTTPS）============
    location /lynxkit/ {
        alias /var/www/lynxkit-updates/lynxkit/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type" always;
        add_header Accept-Ranges bytes always;
        types {
            text/yaml yml yaml;
            application/octet-stream exe blockmap;
            application/json json;
        }
        default_type application/octet-stream;
    }
}
