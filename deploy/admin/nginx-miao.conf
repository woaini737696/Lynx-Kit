# 妙想运营后台 - miao.lynxdo.com
# 独立管理后台（静态导出 + Nginx 托管）
# 创建：2026-07-05

# ============ HTTP（用于 Let's Encrypt 证书申请 + HTTP 跳转）============
server {
    listen 80;
    server_name miao.lynxdo.com;

    # Let's Encrypt webroot 验证
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # 其余全部跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============ HTTPS（静态托管 + API 反代）============
server {
    listen 443 ssl http2;
    server_name miao.lynxdo.com;

    ssl_certificate /etc/letsencrypt/live/miao.lynxdo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miao.lynxdo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============ API 反向代理（共享 miaox.lynxdo.com 的 API 服务）============
    location /api/ {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ============ 静态资源长缓存（_next/static）============
    location /_next/static/ {
        root /opt/lynxkit/admin;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ============ 静态托管 admin 单页应用 ============
    # Next.js 静态导出生成 /users.html /agents.html 等文件
    # 需要将 /users 这样的路由映射到 /users.html
    root /opt/lynxkit/admin;
    index index.html;

    # /login 路由 → /login.html
    location = /login {
        try_files /login.html =404;
    }

    # 各管理模块路由 → 对应 .html
    location ~ ^/(users|store|builds|ai-models|agents|configs|roles|audit)$ {
        try_files /$1.html =404;
    }

    # 根路径 → index.html（数据看板）
    location = / {
        try_files /index.html =404;
    }

    # 其他 try_files（_next 资源等）
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 禁止访问 .txt 元数据文件
    location ~ \.txt$ {
        deny all;
        return 404;
    }

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;
}
