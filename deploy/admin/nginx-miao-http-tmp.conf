# 临时 HTTP 配置：仅用于 certbot 申请 Let's Encrypt 证书
# 申请成功后会替换为 nginx-miao.conf（含 HTTPS）

server {
    listen 80;
    server_name miao.lynxdo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 200 "miao.lynxdo.com - cert provisioning";
        add_header Content-Type text/plain;
    }
}
