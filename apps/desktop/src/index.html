<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LynxKit - AI 产品构建器</title>
    <script>
      // 强制浅色模式：清除旧版本持久化的暗色主题（避免黑屏）
      try {
        var raw = localStorage.getItem("lynxkit-ui");
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && parsed.state && parsed.state.theme !== "light") {
            parsed.state.theme = "light";
            parsed.version = 2;
            localStorage.setItem("lynxkit-ui", JSON.stringify(parsed));
          }
        }
      } catch (e) {}
      // 确保 html 不带 dark class
      document.documentElement.classList.remove("dark");
    </script>
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased">
    <div id="root">
      <div id="app-loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;color:#666;font-family:system-ui,sans-serif;">
        <div style="text-align:center;">
          <div style="font-size:24px;font-weight:bold;color:#ff6b35;margin-bottom:8px;">LynxKit</div>
          <div style="font-size:13px;">正在加载...</div>
        </div>
      </div>
    </div>
    <script>
      // 捕获渲染进程致命错误并显示
      window.addEventListener("error", function(e) {
        var loading = document.getElementById("app-loading");
        if (loading) {
          loading.innerHTML = '<div style="text-align:center;padding:20px;">' +
            '<div style="font-size:20px;font-weight:bold;color:#ff6b35;margin-bottom:12px;">LynxKit 加载失败</div>' +
            '<div style="font-size:12px;color:#999;background:#fff5f5;border:1px solid #fed7d7;border-radius:6px;padding:10px;max-width:400px;word-break:break-all;white-space:pre-wrap;">' +
            (e.message || "未知错误") + "\n" + (e.filename || "") + ":" + (e.lineno || "") +
            '</div></div>';
        }
      });
      window.addEventListener("unhandledrejection", function(e) {
        console.error("Unhandled rejection:", e.reason);
      });
    </script>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
