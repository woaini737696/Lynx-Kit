# LynxKit Desktop 打包配置（electron-builder）
# https://www.electron.build/configuration

appId: com.lynxkit.desktop
productName: 妙想
copyright: Copyright © 2026 妙想

directories:
  output: release
  buildResources: build

# 打包产物包含的文件：electron-vite 构建产物（out/）+ package.json
files:
  - out/**/*
  - package.json

extraMetadata:
  main: out/main/index.js

# Windows NSIS 安装包
win:
  target:
    - nsis
  artifactName: LynxKit-Setup-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 妙想

# 自动更新源：自建静态服务器（generic provider）
# 部署在阿里云 ECS nginx HTTPS，miaox.lynxdo.com 域名
# 服务器目录结构：
#   /var/www/lynxkit-updates/lynxkit/latest.yml   # 版本元数据
#   /var/www/lynxkit-updates/lynxkit/LynxKit-Setup-x.y.z-x64.exe
#   /var/www/lynxkit-updates/lynxkit/LynxKit-Setup-x.y.z-x64.exe.blockmap
# 发布流程：本地构建 → scp 上传 installer/ 产物到服务器 → 更新 latest.yml
# 运行时可通过环境变量 LYNXKIT_UPDATE_SERVER_URL 覆盖（见 electron/services/auto-updater.ts）
publish:
  provider: generic
  url: https://miaox.lynxdo.com/lynxkit/
  channel: latest
