# LynxKit Desktop 打包配置（electron-builder）
# https://www.electron.build/configuration

appId: com.lynxkit.desktop
productName: LynxKit
copyright: Copyright © 2026 LynxKit

directories:
  output: installer
  buildResources: build

# 打包产物包含的文件：electron-vite 构建产物（out/）+ package.json
files:
  - out/**/*
  - package.json

extraMetadata:
  main: out/main/index.js

# Windows NSIS 安装包
win:
  target:
    - nsis
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: LynxKit

# 自动更新源：自建静态服务器（generic provider）
# 服务器目录结构：
#   /lynxkit/latest.yml             # 最新版本元数据（electron-builder 自动生成）
#   /lynxkit/LynxKit-Setup-x.y.z-x64.exe
#   /lynxkit/LynxKit-x.y.z-x64.exe.blockmap
# 发布命令：pnpm --filter @lynxkit/desktop dist --publish always
# 上传：将 installer/ 目录下产物上传到服务器对应路径
# 运行时可通过环境变量 LYNXKIT_UPDATE_SERVER_URL 覆盖（见 electron/services/auto-updater.ts）
publish:
  provider: generic
  url: https://updates.lynxkit.com/lynxkit/
  channel: latest
