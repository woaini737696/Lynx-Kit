version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_core:
    path: ../../packages/flutter_core
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  tray_manager: ^0.2.3
  window_manager: ^0.4.2
  hotkey_manager: ^0.2.3
  multi_window_manager: ^0.1.1
  file_picker: ^8.0.3
  desktop_drop: ^0.4.4
  re_editor: ^0.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
