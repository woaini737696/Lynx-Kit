# LynxKit API - Cloudflare Workers 部署配置（开发环境）
#
# 本地开发使用 `pnpm dev`（基于 @hono/node-server），
# 此配置仅在需要部署到 Cloudflare Workers 时使用。

name = "lynxkit-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# 开发环境
[env.dev]
name = "lynxkit-api-dev"

  [env.dev.vars]
  NODE_ENV = "development"
  PORT = "8787"
  CORS_ORIGINS = "http://localhost:3000,http://localhost:5173,capacitor://localhost,http://localhost"

# 生产环境变量通过 wrangler secret 注入：
#   wrangler secret put DATABASE_URL
#   wrangler secret put BETTER_AUTH_SECRET
#   wrangler secret put KMS_MASTER_KEY
#   wrangler secret put DEEPSEEK_API_KEY
#   ...

# 本地开发使用 .dev.vars 文件加载环境变量
[vars]
NODE_ENV = "development"

# KV / R2 / D1 绑定（按需开启）
# [[env.dev.d1_databases]]
# binding = "DB"
# database_name = "lynxkit-dev"
# database_id = "<your-d1-database-id>"
